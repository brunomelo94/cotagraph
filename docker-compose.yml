services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cotagraph}
      POSTGRES_USER: ${POSTGRES_USER:-cotagraph}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev_only}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cotagraph}"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/localdev_only}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-localdev_only} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cotagraph}:${POSTGRES_PASSWORD:-localdev_only}@postgres:5432/${POSTGRES_DB:-cotagraph}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-localdev_only}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic

  ingestion:
    build: ./ingestion
    profiles: ["ingestion"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cotagraph}:${POSTGRES_PASSWORD:-localdev_only}@postgres:5432/${POSTGRES_DB:-cotagraph}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-localdev_only}
      CSV_PATH: /data/emendas_por_favorecido_partidos.csv
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - ./ingestion/pipelines:/app/pipelines
      - e:/Learning/TCC-MBA/data:/data:ro

volumes:
  pgdata:
  neo4jdata:
